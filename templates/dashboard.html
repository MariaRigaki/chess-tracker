<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Activity & Chess Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border-radius: 0.75rem; padding: 1.5rem; border: 1px solid #334155; }
        .btn-action { background-color: #3b82f6; transition: all 0.2s; }
        .btn-action:hover { background-color: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body class="p-8 bg-slate-950 text-slate-200">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Weekly Tracker <span class="text-blue-500">2026</span></h1>
            <div id="sync-status" class="text-sm text-slate-400">
                System Ready
            </div>
        </div>

        <div class="flex space-x-4 mb-8 border-b border-slate-800 pb-2">
            <button hx-get="/dashboard" hx-target="#main-content" class="px-4 py-2 hover:text-blue-400 font-bold">🏠 Dashboard</button>
            <button hx-get="/log-view" hx-target="#main-content" class="px-4 py-2 hover:text-blue-400 font-bold">📅 Activity Log</button>
            <button hx-get="/chess" hx-target="#main-content" class="px-4 py-2 hover:text-blue-400 font-bold">♟️ Chess</button>
            <button hx-get="/stats" hx-target="#main-content" class="px-4 py-2 hover:text-blue-400 font-bold">📊 Activity Stats</button>
        </div>

        <div id="main-content" hx-get="/dashboard" hx-trigger="load" hx-target="this" class="mb-8">
            <!-- Dashboard content loads here -->
        </div>

    <script>
        // Simple helper to refresh page after sync so the table updates
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.xhr.responseText.includes("Synced")) {
                setTimeout(() => location.reload(), 1000);
            }
        });
    </script>
</body>
</html>

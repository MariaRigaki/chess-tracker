<div id="activity-list" class="space-y-6">
    {% for week, activities in weekly_data %}
    <div class="card">
        <h3 class="text-lg font-semibold mb-4 text-blue-400">{{ week }}</h3>
        <ul class="space-y-2">
            {% for activity in activities %}
            <li class="flex justify-between items-center text-slate-300 bg-slate-800/50 p-3 rounded">
                <div>
                    <span class="font-bold">{{ activity.name }}</span> - {{ activity.minutes }} min
                    {% if activity.comment %}
                    <p class="text-sm text-slate-400">{{ activity.comment }}</p>
                    {% endif %}
                </div>
                <span class="text-xs text-slate-500>{{ activity.activity_date.strftime('%d.%m') }} at {{ activity.created_at.strftime('%H:%M') }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
    {% endfor %}
</div>
